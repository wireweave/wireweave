name: Publish packages

# Monorepo variant of the user's standard publish workflow
# (_toolkits/private-toolkit/workflows/publish.yml). Single workflow handles
# both develop→beta and main→stable, plus the post-release back-merge to
# develop, exactly like the single-package release-it template. The only
# difference is the publish command: this repo is a changesets independent-mode
# monorepo, so release-it is replaced with the
# `changeset version → commit → changeset publish` sequence. The branch
# split, OIDC permissions, [skip ci] guards, and trailing sync step are
# identical to the canonical template.
#
# NOTE: vscode-extension (published via vsce / ovsx) and docs (deployed to
# Vercel) live in this monorepo but are NOT changesets npm publish targets —
# they are listed in .changeset/config.json `ignore`. Each ships through its
# own separate pipeline (a vsce/ovsx publish workflow for the extension,
# Vercel's automatic deploy for docs), wired separately from this workflow.

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

# Two publish runs against the same branch must not interleave: the second
# would see a half-applied version commit and fight the first on tag push.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write # OIDC token for npm Trusted Publishing
      pull-requests: write
    env:
      # The CI runner is not a developer machine — local pre-commit hooks
      # (lint-staged, prettier) re-formatting a `chore: version …` commit
      # against staged release-bookkeeping files is noise at best and a race
      # with the version commit at worst. Skip husky entirely in CI.
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Trusted Publishing requires npm >= 11.5.1; what Node bundles is older.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish Beta (develop branch)
        if: github.ref == 'refs/heads/develop'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          # Real prerelease versions (X.Y.Z-beta.N) via changesets pre mode.
          # pre.json carries the mode + tag and lives on develop between runs;
          # a stable release on main deletes it, the sync step removes it from
          # develop, so the next develop push re-enters pre mode here.
          if [ ! -f .changeset/pre.json ]; then
            pnpm exec changeset pre enter beta
          fi

          # Apply pending changesets onto the committed beta version. In pre
          # mode the .md files persist (pre.json tracks which are applied), so
          # this is idempotent when nothing new landed.
          pnpm exec changeset version

          # Commit + push the version bump immediately so the next run's
          # `changeset publish` sees the same tree the npm registry will see.
          # [skip ci] prevents this commit from re-triggering the workflow.
          # Retry once on non-fast-forward: between checkout and push another
          # job (or a manual push) may have advanced the branch — pull --rebase
          # and re-push so the version commit lands on top instead of failing.
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: version wireweave packages beta prerelease [skip ci]"
            if ! git push origin "${GITHUB_REF_NAME}"; then
              echo "non-fast-forward on first push; rebasing and retrying"
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
              git push origin "${GITHUB_REF_NAME}"
            fi
          fi

          # Pre mode publish: DO NOT pass --tag here. Changesets routes
          # prerelease versions to the tag recorded in .changeset/pre.json
          # automatically (cli/src/.../publishPackages.ts: getReleaseTag
          # returns preState.tag), and rejects any explicit --tag with
          # "Releasing under custom tag is not allowed in pre mode"
          # (cli/.../run.ts pre-mode guard). Idempotent when nothing new
          # versioned; annotated per-package tags are created and pushed
          # together with --follow-tags.
          pnpm exec changeset publish
          if ! git push --follow-tags origin "${GITHUB_REF_NAME}"; then
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push --follow-tags origin "${GITHUB_REF_NAME}"
          fi

      - name: Publish Release (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ -n "$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit)" ]; then
            # Leave changesets pre mode (carried in from develop) so the stable
            # release aggregates to a clean X.Y.Z rather than another beta.N.
            # changeset version computes the bump from pre.json initialVersions
            # + the accumulated changesets, so the intermediate beta.N in
            # package.json is overwritten with the final stable version, and
            # the consumed .md files are deleted along with pre.json itself.
            if [ -f .changeset/pre.json ]; then
              pnpm exec changeset pre exit
            fi
            pnpm exec changeset version
            git add -A
            git commit -m "chore: release wireweave packages [skip ci]"
            if ! git push origin "${GITHUB_REF_NAME}"; then
              echo "non-fast-forward on first push; rebasing and retrying"
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
              git push origin "${GITHUB_REF_NAME}"
            fi
          fi
          pnpm exec changeset publish
          if ! git push --follow-tags origin "${GITHUB_REF_NAME}"; then
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push --follow-tags origin "${GITHUB_REF_NAME}"
          fi

      - name: Sync main to develop
        if: github.ref == 'refs/heads/main'
        run: |
          # Single-workflow back-merge — mirrors the canonical template's
          # closing step. After a stable release main owns the release
          # bookkeeping (package versions, CHANGELOGs, pre-mode state). The
          # normal back-merge is conflict-free; the resolution block below only
          # fires on a race (a develop push overlapping the release).
          #
          # Race-loss-safe conflict policy:
          #   - For packages/*/package.json and CHANGELOG.md: take whichever
          #     side has the higher SemVer version. This preserves a forward
          #     prerelease line on develop (e.g. 1.1.0-beta.N) instead of
          #     regressing it to the stable version that just landed on main.
          #     A naive `--theirs` (main always wins) would drag develop's
          #     versions backwards — the exact regression observed when PR #9's
          #     push lost a non-fast-forward race. The next stable release
          #     reconciles the prerelease line into the final X.Y.Z anyway.
          #   - For .changeset/pre.json and consumed .changeset/*.md: accept
          #     main's deletion. These are modify/delete conflicts; develop
          #     re-enters pre mode on its next push and recreates pre.json.
          git fetch origin develop
          git checkout develop
          if ! git merge --no-ff main -m "chore: sync main into develop after stable release [skip ci]"; then
            for f in $(git diff --name-only --diff-filter=U -- 'packages/*/package.json' 'packages/*/CHANGELOG.md'); do
              ours_ver=$(git show :2:"$f" 2>/dev/null | grep -m1 '"version"' | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/' || true)
              theirs_ver=$(git show :3:"$f" 2>/dev/null | grep -m1 '"version"' | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/' || true)
              if [ -n "$ours_ver" ] && [ -n "$theirs_ver" ]; then
                higher=$(printf "%s\n%s\n" "$ours_ver" "$theirs_ver" | sort -V | tail -1)
                if [ "$higher" = "$ours_ver" ]; then
                  git checkout --ours "$f"
                else
                  git checkout --theirs "$f"
                fi
              else
                # No version field on one side (e.g. CHANGELOG.md): keep the
                # forward branch (develop) for narrative continuity.
                git checkout --ours "$f"
              fi
              git add "$f"
            done
            # The stable release deletes the changesets pre-mode bookkeeping
            # on main: pre.json is removed once `changeset version` finalises
            # the exit, and every applied .md is consumed. These surface as
            # modify/delete conflicts (no "theirs" blob to check out), so
            # accept the deletions — develop re-enters pre mode and recreates
            # pre.json on its next push.
            for f in $(git diff --name-only --diff-filter=U -- '.changeset/pre.json' '.changeset/*.md'); do
              git rm -f "$f" 2>/dev/null || true
            done
            if [ -n "$(git ls-files -u)" ]; then
              echo "Non-version conflicts detected. Manual intervention required."
              git merge --abort
              exit 1
            fi
            git commit --no-edit
          fi
          if ! git push origin develop; then
            git pull --rebase --autostash origin develop
            git push origin develop
          fi
